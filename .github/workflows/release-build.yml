name: Build desktop installers

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }} installer
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
            artifact-name: cmmuu-music-linux
            bundle-path: src-tauri/target/release/bundle
          - name: macos
            runner: macos-latest
            artifact-name: cmmuu-music-macos
            bundle-path: src-tauri/target/release/bundle
          - name: windows
            runner: windows-latest
            artifact-name: cmmuu-music-windows
            bundle-path: src-tauri/target/release/bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop installer
        run: pnpm tauri:build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact-name }}
          path: |
            ${{ matrix.platform.bundle-path }}/**/*.AppImage
            ${{ matrix.platform.bundle-path }}/**/*.deb
            ${{ matrix.platform.bundle-path }}/**/*.rpm
            ${{ matrix.platform.bundle-path }}/**/*.dmg
            ${{ matrix.platform.bundle-path }}/**/*.exe
            ${{ matrix.platform.bundle-path }}/**/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
